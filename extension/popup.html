<!doctype html>
<html lang="vi"><head><meta charset="utf-8">
<style>
  :root { color-scheme: dark; }
  body { width: 300px; margin: 0; font-family: system-ui, Segoe UI, Roboto, sans-serif;
         background: #0f1115; color: #e7e9ee; padding: 14px; }
  h1 { font-size: 15px; margin: 0 0 12px; display: flex; align-items: center; gap: 6px; }
  label { font-size: 11px; color: #9aa3b2; display: block; margin: 8px 0 3px; }
  input { width: 100%; box-sizing: border-box; background: #0f1115; border: 1px solid #2b3142;
          color: #e7e9ee; border-radius: 8px; padding: 8px 10px; font-size: 13px; }
  button { width: 100%; margin-top: 12px; background: #6366f1; color: #fff; border: 0;
           border-radius: 8px; padding: 10px; font-size: 13px; cursor: pointer; }
  button.ghost { background: #222736; margin-top: 8px; }
  .status { margin-top: 12px; font-size: 12px; padding: 9px 11px; border-radius: 8px;
            background: #171a21; border: 1px solid #232734; line-height: 1.5; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .on { background: #4ade80; } .off { background: #f87171; }
  .muted { color: #9aa3b2; }
  .hide { display: none; }
</style></head>
<body>
  <h1>🎬 VEO3 Web Bridge</h1>

  <div id="login">
    <label>Địa chỉ server</label>
    <input id="server" placeholder="https://api.tên-miền.com" />
    <label>Email</label>
    <input id="email" type="email" placeholder="email của bạn" />
    <label>Mật khẩu</label>
    <input id="password" type="password" placeholder="••••••" />
    <button id="connect">Đăng nhập & Kết nối</button>
  </div>

  <div id="status" class="status"></div>
  <button id="logout" class="ghost hide">Đăng xuất</button>

  <script src="popup.js"></script>
</body></html>
