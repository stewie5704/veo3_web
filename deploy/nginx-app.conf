# App subdomain: serve React build + reverse-proxy API/WS/media tới backend (CÙNG ORIGIN → khỏi CORS).
# /etc/nginx/sites-available/veo3-app  →  ln -s vào sites-enabled  →  certbot --nginx -d app.aiautocut.com
server {
    listen 80;
    server_name app.aiautocut.com;          # <-- đổi domain

    root /opt/veo3-web/frontend/dist;         # vite build output
    index index.html;
    client_max_body_size 210M;                # cho upload video (MAX_VIDEO_SIZE_MB)

    # Backend (gunicorn 127.0.0.1:8000): API + các route động
    location /api/      { proxy_pass http://127.0.0.1:8000; include /etc/nginx/snippets/veo3-proxy.conf; }
    location /shared/   { proxy_pass http://127.0.0.1:8000; include /etc/nginx/snippets/veo3-proxy.conf; }
    location ~ ^/(uploads|images|audio|merged|thumbnails)/ {
        proxy_pass http://127.0.0.1:8000; include /etc/nginx/snippets/veo3-proxy.conf;
    }

    # WebSocket cho extension
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;             # giữ WS lâu
    }

    # React SPA: file tĩnh, fallback về index.html
    location / { try_files $uri /index.html; }
}

# --- Tạo /etc/nginx/snippets/veo3-proxy.conf với nội dung: ---
#   proxy_set_header Host $host;
#   proxy_set_header X-Real-IP $remote_addr;
#   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#   proxy_set_header X-Forwarded-Proto $scheme;
#   # LLM (autoprompt/parse-script) gọi Gemini có thể >60s (fallback nhiều model) -> nâng timeout
#   # khỏi mặc định 60s, tránh nginx trả 504 trong khi backend vẫn đang chạy.
#   proxy_read_timeout 180s;
#   proxy_send_timeout 180s;
#   proxy_connect_timeout 15s;
