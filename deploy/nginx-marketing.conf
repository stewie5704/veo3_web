# Root domain = trang marketing tĩnh (Astro build, Phase 2). SEO sống ở đây.
# /etc/nginx/sites-available/veo3-marketing → certbot --nginx -d aiautocut.com -d www.aiautocut.com
server {
    listen 80;
    server_name aiautocut.com www.aiautocut.com;   # <-- đổi domain

    root /opt/veo3-web/marketing/dist;               # Astro build output (Phase 2)
    index index.html;

    # Astro xuất file tĩnh; phục vụ trực tiếp, fallback 404 đẹp
    location / { try_files $uri $uri/ $uri.html /404.html; }

    # sitemap/robots phục vụ thẳng
    location = /robots.txt  { }
    location = /sitemap.xml { }
}
